version: '3.8'

services:
  app:
    build: .
    container_name: interview_bot_app
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: interview_bot_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  # This service ensures the required model is pulled automatically
  ollama-pull-model:
    image: curlimages/curl:latest
    container_name: interview_bot_pull_model
    depends_on:
      - ollama
    command: >
      sh -c "
      echo 'Waiting for Ollama to become ready...'
      sleep 10
      curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"llama3.2:3b\"}'
      echo 'Model pulled successfully.'
      "

volumes:
  ollama_data:
